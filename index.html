<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👋</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="pixels" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <main class="console">
        <div class="console-body">
            <section class="screen-lens">
                <div class="power-indicator">
                    <span class="led"></span>
                </div>
                <!-- Added "clickable" class for scanline effects on click -->
                <div class="screen-display" id="main-screen">
                    <div id="start-overlay">
                        <div class="start-content">
                            <h2>SYSTEM BOOT</h2>
                            <p class="blink">PRESS ANY BUTTON</p>
                        </div>
                    </div>
                    
                    <div class="battery" id="battery-indicator">
                        <div class="battery-level" id="battery-level"></div>
                    </div>

                    <header class="profile">
                        <div class="intro">
                            <h1>SWAPNIL SHARMA</h1>
                            <p class="tagline">HEY! HOW DO YOU DO?</p>
                        </div>
                    </header>
    
                    <div class="tabs-header">
                        <div class="tab-indicator active" id="tab-ind-0">LINKS</div>
                        <div class="tab-indicator" id="tab-ind-1">ABOUT</div>
                    </div>

                    <div class="tab-container">
                        <div class="tab-content active" id="tab-0">
                            <nav class="links">
                                <!-- Links rendered by JavaScript -->
                            </nav>
                        </div>
                        <div class="tab-content" id="tab-1">
                            <div class="about-text">
                                <p>I love playing guitar, lifting weights, long drives, and video games. I like to believe I'm Batman, but I'm just an engineer who loves a good laugh.😌</p>
                            </div>
                        </div>
                    </div>
    
                    <footer class="footer">
                        <p>MADE WITH &lt;3</p>
                    </footer>
                </div>
            </section>
    
            <section class="controls">
                <div class="dpad-area">
                    <div class="dpad">
                        <button id="up" class="dpad-btn dpad-up" aria-label="Up"></button>
                        <button id="right" class="dpad-btn dpad-right" aria-label="Right"></button>
                        <button id="down" class="dpad-btn dpad-down" aria-label="Down"></button>
                        <button id="left" class="dpad-btn dpad-left" aria-label="Left"></button>
                        <div class="dpad-center"></div>
                    </div>
                </div>
                <div class="action-buttons">
                    <div class="btn-group">
                        <button type="button" class="btn-a" id="btn-a">A</button>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn-b" id="btn-b">B</button>
                    </div>
                </div>
            </section>
            
            <section class="meta-controls">
                <button class="pill-btn select" id="btn-select"></button>
                <button class="pill-btn start" id="btn-start"></button>
            </section>

            <div class="speaker">
                <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>
    </main>

    <script src="js/icons.js"></script>
</body>
</html>
